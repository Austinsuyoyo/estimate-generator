    // 主題切換功能
    function initTheme() {
      // 檢查本地儲存中是否有主題設置
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'light' || savedTheme === 'dark') {
        document.documentElement.setAttribute('data-theme', savedTheme);
        updateThemeIcon(savedTheme);
      } else if (savedTheme === 'auto' || !savedTheme) {
        // 檢查系統偏好
        const prefersDarkScheme = window.matchMedia('(prefers-color-scheme: dark)');
        if (prefersDarkScheme.matches) {
          document.documentElement.setAttribute('data-theme', 'dark');
          updateThemeIcon('dark');
        } else {
          document.documentElement.setAttribute('data-theme', 'light');
          updateThemeIcon('light');
        }
        
        // 監聽系統主題變化
        prefersDarkScheme.addEventListener('change', (e) => {
          if (localStorage.getItem('theme') === 'auto' || !localStorage.getItem('theme')) {
            const newTheme = e.matches ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            updateThemeIcon(newTheme);
          }
        });
        
        if (!savedTheme) {
          localStorage.setItem('theme', 'auto');
        }
      }
    }

    function toggleTheme() {
      const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
      const newTheme = currentTheme === 'light' ? 'dark' : 'light';
      
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      updateThemeIcon(newTheme);
      
      // 顯示主題切換提示
      const themeName = newTheme === 'light' ? '淺色' : '深色';
      showToast('主題已切換', `已切換至${themeName}主題`, 'info');
    }
    
    function setTheme(theme) {
      if (theme === 'auto') {
        localStorage.setItem('theme', 'auto');
        const prefersDarkScheme = window.matchMedia('(prefers-color-scheme: dark)');
        const systemTheme = prefersDarkScheme.matches ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', systemTheme);
        updateThemeIcon(systemTheme);
        showToast('主題已設置', '已設置為跟隨系統主題', 'info');
      } else {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
        updateThemeIcon(theme);
        const themeName = theme === 'light' ? '淺色' : '深色';
        showToast('主題已設置', `已設置為${themeName}主題`, 'info');
      }
      
      // 關閉模態框
      $('#localStorageModal').modal('hide');
    }

    function updateThemeIcon(theme) {
      const lightIcon = document.getElementById('lightIcon');
      const darkIcon = document.getElementById('darkIcon');
      
      if (theme === 'dark') {
        lightIcon.style.display = 'none';
        darkIcon.style.display = 'inline-block';
      } else {
        lightIcon.style.display = 'inline-block';
        darkIcon.style.display = 'none';
      }
    }

    $(document).ready(function() {
      // 初始化設定
      setDefaultDates();
      $("#quoteNumber").val(generateQuoteNumber());
      toggleEmptyState();

      // 初始化主題
      initTheme();
      
      // 主題切換按鈕事件
      $("#themeToggle").click(toggleTheme);
      
      // 初始化 tooltips
      const tooltipTriggerList = [].slice.call(document.querySelectorAll('[title]'));
      tooltipTriggerList.map(function (tooltipTriggerEl) {
        return new bootstrap.Tooltip(tooltipTriggerEl);
      });
      
      // Logo 預覽
      function updateLogoPreview() {
        const url = $('#providerLogo').val().trim();
        const $img = $('#logoPreviewImg');
        const $status = $('#logoStatus');
        if (!url) {
          $img.hide();
          $status.text('輸入 URL 後將顯示預覽');
          return;
        }
        $status.text('載入中…');
        $img.off('load error').attr('src', url).show();
        $img.on('load', function() { $status.text(''); });
        $img.on('error', function() { $img.hide(); $status.text('無法載入圖片，請確認 URL 是否正確'); });
      }
      $('#providerLogo').on('input blur', updateLogoPreview);
      updateLogoPreview();

      // Logo 本機上傳 → 轉 Base64 存入 URL 欄位
      $('#logoFileInput').on('change', function() {
        const file = this.files[0];
        if (!file) return;
        if (!file.type.startsWith('image/')) { showAlert('請選擇圖片檔案'); return; }
        if (file.size > 2 * 1024 * 1024) { showAlert('圖片大小請勿超過 2MB'); return; }
        const reader = new FileReader();
        reader.onload = function(e) {
          $('#providerLogo').val(e.target.result);
          updateLogoPreview();
          saveFormDataToLocalStorage();
        };
        reader.readAsDataURL(file);
      });

      // 常用客戶
      renderSavedCustomersList();
      $('#saveCustomerBtn').on('click', saveCurrentCustomer);

      // 按鈕事件綁定（全部統一用 jQuery .on()）
      $("#addBakeryButton").on('click', () => addItem('bakery'));
      $("#addDrinkButton").on('click', () => addItem('drink'));
      $("#addOtherButton").on('click', () => addItem('other'));
      $("#refreshButton").on('click', updateTotals);
      $("#sysResetBtn, #floatResetBtn").on('click', resetForm);
      $("#exportUpdateBtn").on('click', exportFormData);
      $("#exportCopyBtn").on('click', copyExportedJson);
      $("#exportDownloadBtn").on('click', downloadJson);
      $("#importSubmitBtn").on('click', importFormData);
      $("#themeLightBtn").on('click', () => setTheme('light'));
      $("#themeDarkBtn").on('click', () => setTheme('dark'));
      $("#themeAutoBtn").on('click', () => setTheme('auto'));
      $("#manualSaveBtn").on('click', function() {
        saveFormDataToLocalStorage();
        showToast('保存成功', '表單數據已手動保存到本地儲存', 'success');
        $('#localStorageModal').modal('hide');
      });
      $("#clearStorageBtn").on('click', function() {
        showConfirm('確定要清除本地儲存的表單數據嗎？此操作無法撤銷。', function() {
          clearLocalStorageData();
          $('#localStorageModal').modal('hide');
        }, '清除資料');
      });
      
      // 事件監聽
      $(document)
        .on("input", "input[name$='_quantity'], input[name$='_price'], #taxPercent", function() {
          updateTotals();
          // 添加防抖動自動保存
          clearTimeout(window.autoSaveTimeout);
          window.autoSaveTimeout = setTimeout(function() {
            saveFormDataToLocalStorage();
          }, 1000); // 1秒後自動保存
        })
        .on("blur", "input[name$='_quantity']", handleBlurSetOne)
        .on("blur", "input[name$='_price']", handleBlurSetZero);
      
      // 監聽所有表單輸入變更，自動保存
      $("input, select, textarea").on("change", function() {
        clearTimeout(window.autoSaveTimeout);
        window.autoSaveTimeout = setTimeout(function() {
          saveFormDataToLocalStorage();
        }, 1000); // 1秒後自動保存
      });
      
      // 當匯出模態框打開時，自動更新 JSON 數據
      $('#exportModal').on('show.bs.modal', function() {
        exportFormData();
      });
      
      // 外送相關：field 變更 → 更新積木裡的 token badge
      $("#deliveryDate").on("change", updateDeliveryDay);
      $("#deliveryTime").on("change input", function() { updateRemarksToken('deliveryTime'); });
      $("#contactAddress").on("change input", function() { updateRemarksToken('contactAddress'); });
      $("#deliveryStoreName").on("change input", function() { updateRemarksToken('deliveryStoreName'); });
      $("#validDays").on("change", function() { updateRemarksToken('validDays'); });
      
      // 表單提交
      $("#quoteForm").on("submit", function(e) {
        if (!validateForm()) {
          e.preventDefault();
          return false;
        }
        
        // 保存表單數據到 localStorage
        saveFormDataToLocalStorage();
        
        if ($("input[name='item_quantity']").length > 20) {
          $("<input>").attr({
            type: "hidden",
            name: "hasLargeDataset",
            value: "true"
          }).appendTo($(this));
        }
      });
      
      // 初始化備註積木編輯器（若 localStorage 有資料，loadFormDataFromLocalStorage 會覆蓋）
      renderRemarksToolbar();
      initRemarksBlocks();

      // 嘗試從 localStorage 加載數據
      loadFormDataFromLocalStorage();
      
      // 如果沒有保存的數據，也顯示通知
      if (!localStorage.getItem('estimateFormData') && !localStorage.getItem('localStorageNotificationShown')) {
        setTimeout(showLocalStorageNotification, 2000);
      }
    });
    </script>
  </body>
</html>
