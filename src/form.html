<!DOCTYPE html>
<html lang="zh-TW">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>報價單產生器</title>
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Bootstrap Icons CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet" />
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      /* ── Design Tokens ────────────────────────────────── */
      :root {
        --green-50:  #f0fdf4;
        --green-100: #dcfce7;
        --green-200: #bbf7d0;
        --green-500: #22c55e;
        --green-600: #16a34a;
        --green-700: #15803d;
        --green-800: #166534;

        --slate-50:  #f8fafc;
        --slate-100: #f1f5f9;
        --slate-200: #e2e8f0;
        --slate-300: #cbd5e1;
        --slate-400: #94a3b8;
        --slate-500: #64748b;
        --slate-600: #475569;
        --slate-700: #334155;
        --slate-800: #1e293b;
        --slate-900: #0f172a;

        /* Semantic tokens – light */
        --color-primary:        var(--green-600);
        --color-primary-hover:  var(--green-700);
        --color-primary-light:  var(--green-500);
        --color-primary-muted:  var(--green-100);

        --color-surface:        #ffffff;
        --color-surface-raised: var(--slate-50);
        --color-surface-inset:  var(--slate-100);
        --color-border:         var(--slate-200);
        --color-border-strong:  var(--slate-300);

        --color-text:           var(--slate-900);
        --color-text-secondary: var(--slate-600);
        --color-text-tertiary:  var(--slate-400);

        --color-danger:  #ef4444;
        --color-warning: #f59e0b;
        --color-success: #10b981;
        --color-info:    #3b82f6;

        --radius-sm: 6px;
        --radius-md: 10px;
        --radius-lg: 14px;
        --radius-xl: 20px;

        --shadow-xs: 0 1px 2px rgba(0,0,0,.05);
        --shadow-sm: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
        --shadow-md: 0 4px 6px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.04);
        --shadow-lg: 0 10px 15px rgba(0,0,0,.07), 0 4px 6px rgba(0,0,0,.04);
      }

      [data-theme="dark"] {
        --color-primary:        var(--green-500);
        --color-primary-hover:  var(--green-400, #4ade80);
        --color-primary-light:  var(--green-600);
        --color-primary-muted:  #14532d;

        --color-surface:        #0f172a;
        --color-surface-raised: #1e293b;
        --color-surface-inset:  #0d1625;
        --color-border:         #1e3a5f30;
        --color-border-strong:  var(--slate-700);

        --color-text:           #f1f5f9;
        --color-text-secondary: #94a3b8;
        --color-text-tertiary:  var(--slate-600);

        --shadow-xs: 0 1px 2px rgba(0,0,0,.3);
        --shadow-sm: 0 1px 3px rgba(0,0,0,.4), 0 1px 2px rgba(0,0,0,.2);
        --shadow-md: 0 4px 6px rgba(0,0,0,.4), 0 2px 4px rgba(0,0,0,.2);
        --shadow-lg: 0 10px 15px rgba(0,0,0,.4), 0 4px 6px rgba(0,0,0,.2);
      }

      /* ── Base ─────────────────────────────────────────── */
      *, *::before, *::after { box-sizing: border-box; }

      body {
        font-family: 'Inter', 'Noto Sans TC', system-ui, sans-serif;
        font-size: 14px;
        line-height: 1.6;
        background-color: var(--color-surface-inset);
        color: var(--color-text);
        transition: background-color .3s ease, color .3s ease;
        -webkit-font-smoothing: antialiased;
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        color: var(--color-text);
      }

      h5 { font-size: .875rem; font-weight: 600; letter-spacing: .01em; }

      hr { border-color: var(--color-border); opacity: 1; }

      /* ── Page header ──────────────────────────────────── */
      .page-title-area {
        text-align: center;
        padding: 2rem 0 1.5rem;
      }
      .page-title-area h1 { margin-bottom: .25rem; }
      .page-title-area p  { color: var(--color-text-secondary); font-size: .8125rem; margin: 0; }

      /* ── Cards ────────────────────────────────────────── */
      .card {
        background-color: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-sm);
        transition: box-shadow .2s ease;
        overflow: hidden;
      }

      .card-header {
        display: flex;
        align-items: center;
        gap: .5rem;
        padding: .75rem 1.125rem;
        font-weight: 600;
        font-size: .8125rem;
        letter-spacing: .02em;
        text-transform: uppercase;
        border-bottom: 1px solid rgba(255,255,255,.15);
        background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-light) 100%) !important;
        color: #fff !important;
      }

      .card-header i { font-size: 1rem; opacity: .9; }
      .card-header h5 { margin: 0; font-size: .8125rem; font-weight: 600; }

      .card-body { padding: 1.25rem; }

      /* Section card accent colors */
      .card-header-provider { background: linear-gradient(135deg,#16a34a,#22c55e) !important; }
      .card-header-customer { background: linear-gradient(135deg,#0d9488,#14b8a6) !important; }
      .card-header-quote    { background: linear-gradient(135deg,#6366f1,#818cf8) !important; }
      .card-header-items    { background: linear-gradient(135deg,#f59e0b,#fbbf24) !important; color: #1e293b !important; }

      /* ── Form controls ────────────────────────────────── */
      .form-label {
        font-size: .75rem;
        font-weight: 600;
        letter-spacing: .04em;
        text-transform: uppercase;
        color: var(--color-text-secondary);
        margin-bottom: .35rem;
      }

      .form-control, .form-select {
        background-color: var(--color-surface);
        color: var(--color-text);
        border: 1px solid var(--color-border-strong);
        border-radius: var(--radius-sm);
        font-size: .875rem;
        padding: .45rem .75rem;
        transition: border-color .15s ease, box-shadow .15s ease;
      }

      .form-control:focus, .form-select:focus {
        background-color: var(--color-surface);
        color: var(--color-text);
        border-color: var(--color-primary);
        box-shadow: 0 0 0 3px rgba(22,163,74,.18);
        outline: none;
      }

      .form-control::placeholder { color: var(--color-text-tertiary); }

      .form-control[readonly] {
        background-color: var(--color-surface-raised);
        color: var(--color-text-secondary);
        cursor: default;
      }

      textarea.form-control { resize: vertical; min-height: 90px; }

      .input-group .form-control, .input-group .form-select { border-radius: var(--radius-sm) !important; }
      .input-group > *:not(:last-child) { border-right: none; border-radius: var(--radius-sm) 0 0 var(--radius-sm) !important; }
      .input-group > *:not(:first-child) { border-radius: 0 var(--radius-sm) var(--radius-sm) 0 !important; }

      .form-check-input {
        background-color: var(--color-surface);
        border-color: var(--color-border-strong);
      }
      .form-check-input:checked {
        background-color: var(--color-primary);
        border-color: var(--color-primary);
      }
      .form-check-label { color: var(--color-text); font-size: .875rem; }

      /* ── Buttons ──────────────────────────────────────── */
      .btn {
        font-size: .8125rem;
        font-weight: 600;
        letter-spacing: .02em;
        border-radius: var(--radius-sm);
        padding: .45rem .9rem;
        transition: all .15s ease;
      }

      .btn-primary {
        background-color: var(--color-primary);
        border-color: var(--color-primary);
        color: #fff !important;
      }
      .btn-primary:hover, .btn-primary:focus {
        background-color: var(--color-primary-hover);
        border-color: var(--color-primary-hover);
        box-shadow: 0 2px 8px rgba(22,163,74,.35);
      }

      .btn-success {
        background-color: var(--color-success);
        border-color: var(--color-success);
        color: #fff !important;
      }
      .btn-success:hover { background-color: #059669; border-color: #059669; }

      .btn-info {
        background-color: var(--color-info);
        border-color: var(--color-info);
        color: #fff !important;
      }
      .btn-info:hover { background-color: #2563eb; border-color: #2563eb; }

      .btn-warning {
        background-color: var(--color-warning);
        border-color: var(--color-warning);
        color: #fff !important;
      }
      .btn-warning:hover { background-color: #d97706; border-color: #d97706; }

      .btn-danger {
        background-color: var(--color-danger);
        border-color: var(--color-danger);
        color: #fff !important;
      }
      .btn-danger:hover { background-color: #dc2626; border-color: #dc2626; }

      .btn-secondary {
        background-color: var(--color-surface-inset);
        border-color: var(--color-border-strong);
        color: var(--color-text) !important;
      }
      .btn-secondary:hover {
        background-color: var(--color-border);
        border-color: var(--color-border-strong);
      }

      .btn-outline-primary {
        color: var(--color-primary);
        border-color: var(--color-primary);
        background: transparent;
      }
      .btn-outline-primary:hover {
        background-color: var(--color-primary);
        border-color: var(--color-primary);
        color: #fff;
      }

      /* ── Table ────────────────────────────────────────── */
      .table {
        color: var(--color-text);
        border-color: var(--color-border);
        font-size: .8125rem;
      }
      .table th {
        background-color: var(--color-surface-raised);
        color: var(--color-text-secondary);
        border-color: var(--color-border);
        font-size: .7rem;
        font-weight: 700;
        letter-spacing: .06em;
        text-transform: uppercase;
        padding: .65rem .75rem;
      }
      .table td {
        background-color: var(--color-surface);
        border-color: var(--color-border);
        padding: .6rem .75rem;
        vertical-align: middle;
      }
      .table-bordered th, .table-bordered td { border-color: var(--color-border) !important; }

      .table tr.subtotal td,
      .table tr.tax td {
        background-color: var(--color-surface-raised) !important;
        color: var(--color-text-secondary) !important;
        font-weight: 600;
        font-size: .875rem;
      }
      .table tr.total td {
        background: linear-gradient(90deg, var(--color-primary-muted), var(--color-primary-muted)) !important;
        color: var(--color-primary) !important;
        font-weight: 700;
        font-size: 1rem;
        border-top: 2px solid var(--color-primary) !important;
      }
      [data-theme="dark"] .table tr.total td {
        background: rgba(22,163,74,.15) !important;
        color: var(--green-400, #4ade80) !important;
        border-top-color: var(--green-500) !important;
      }

      /* Empty state */
      .items-empty {
        text-align: center;
        padding: 2.5rem 1rem;
        color: var(--color-text-tertiary);
      }
      .items-empty i { font-size: 2rem; display: block; margin-bottom: .5rem; }
      .items-empty p { font-size: .8125rem; margin: 0; }

      /* ── Total chip ───────────────────────────────────── */
      .total-summary {
        background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-light) 100%);
        border-radius: var(--radius-md);
        padding: .75rem 1rem;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: .75rem;
      }
      .total-summary .label { font-size: .75rem; font-weight: 600; opacity: .85; letter-spacing: .04em; text-transform: uppercase; }
      .total-summary .amount { font-size: 1.375rem; font-weight: 700; letter-spacing: -.02em; }

      /* ── Modals ───────────────────────────────────────── */
      .modal-content {
        background-color: var(--color-surface);
        color: var(--color-text);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-lg);
      }
      .modal-header {
        border-bottom: 1px solid var(--color-border);
        padding: 1rem 1.25rem;
      }
      .modal-header .modal-title { font-weight: 600; font-size: .9375rem; }
      .modal-footer {
        border-top: 1px solid var(--color-border);
        padding: .75rem 1.25rem;
      }
      [data-theme="dark"] .btn-close { filter: invert(1) grayscale(100%) brightness(200%); }

      /* ── Toast ────────────────────────────────────────── */
      .toast {
        background-color: var(--color-surface);
        color: var(--color-text);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-md);
        box-shadow: var(--shadow-lg);
        font-size: .8125rem;
      }
      .toast-body { background-color: transparent; color: var(--color-text); }

      /* ── Alert ────────────────────────────────────────── */
      .alert-warning {
        background-color: rgba(245,158,11,.1);
        color: var(--color-text);
        border-color: rgba(245,158,11,.3);
        border-radius: var(--radius-sm);
        font-size: .8125rem;
      }

      /* ── Theme toggle ─────────────────────────────────── */
      .theme-toggle {
        position: fixed;
        top: 16px;
        right: 16px;
        z-index: 1050;
        width: 38px;
        height: 38px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: var(--color-surface);
        color: var(--color-text);
        border: 1px solid var(--color-border-strong);
        cursor: pointer;
        box-shadow: var(--shadow-md);
        transition: transform .25s ease, box-shadow .2s ease;
        font-size: .9rem;
      }
      .theme-toggle:hover {
        transform: rotate(20deg) scale(1.05);
        box-shadow: var(--shadow-lg);
      }

      /* ── Submit FAB ───────────────────────────────────── */
      #submitButton {
        position: fixed;
        bottom: 20px;
        right: 20px;
        width: 56px;
        height: 56px;
        font-size: 22px;
        z-index: 1000;
        border-radius: 50%;
        background: linear-gradient(135deg,var(--color-primary),var(--color-primary-light));
        border: none;
        color: #fff;
        box-shadow: 0 4px 16px rgba(22,163,74,.45);
        transition: transform .2s ease, box-shadow .2s ease;
      }
      #submitButton:hover {
        transform: scale(1.08) translateY(-2px);
        box-shadow: 0 8px 24px rgba(22,163,74,.55);
      }

      /* ── Floating menu ────────────────────────────────── */
      .floating-menu {
        position: fixed;
        bottom: 90px;
        right: 20px;
        z-index: 999;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }
      .btn-floating {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: var(--shadow-md);
        border: none;
        cursor: pointer;
        transition: transform .2s ease, box-shadow .2s ease;
        font-size: 1rem;
        color: #fff !important;
      }
      .btn-floating:hover {
        transform: scale(1.1) translateY(-1px);
        box-shadow: var(--shadow-lg);
      }
      .btn-floating.float-export  { background: linear-gradient(135deg,#6366f1,#818cf8); }
      .btn-floating.float-import  { background: linear-gradient(135deg,#0d9488,#14b8a6); }
      .btn-floating.float-storage { background: linear-gradient(135deg,#f59e0b,#fbbf24); color: #1e293b !important; }
      .btn-floating.float-reset   { background: linear-gradient(135deg,#ef4444,#f87171); }

      /* ── Add item buttons ─────────────────────────────── */
      .add-item-row { display: flex; flex-wrap: wrap; gap: .5rem; align-items: center; margin-bottom: 1rem; }
      .btn-add-bakery { background: linear-gradient(135deg,var(--color-primary),var(--color-primary-light)); border: none; color: #fff !important; border-radius: var(--radius-sm); }
      .btn-add-bakery:hover { filter: brightness(1.08); }
      .btn-add-drink  { background: linear-gradient(135deg,#0d9488,#14b8a6); border: none; color: #fff !important; border-radius: var(--radius-sm); }
      .btn-add-drink:hover  { filter: brightness(1.08); }
      .btn-add-other  { background: var(--color-surface-raised); border: 1px solid var(--color-border-strong); color: var(--color-text) !important; border-radius: var(--radius-sm); }
      .btn-add-other:hover  { background: var(--color-border); }
      .btn-refresh { background: var(--color-surface-raised); border: 1px solid var(--color-border-strong); color: var(--color-text) !important; border-radius: var(--radius-sm); width: 36px; height: 36px; padding: 0; display: flex; align-items: center; justify-content: center; margin-left: auto; }
      .btn-refresh:hover { background: var(--color-border); }

      /* ── System function area ─────────────────────────── */
      .sys-section { margin-top: 2rem; }
      .sys-section hr { margin-bottom: 1.25rem; }
      .sys-section h3 { font-size: .875rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--color-text-secondary); text-align: center; margin-bottom: 1rem; }
      .sys-btn-group { display: flex; flex-wrap: wrap; gap: .5rem; }
      .sys-btn-group .btn { flex: 1 1 auto; }

      /* ── Tax percent inline ───────────────────────────── */
      .tax-row { display: flex; align-items: center; gap: .5rem; margin-top: .5rem; }
      .tax-row label { font-size: .75rem; font-weight: 600; color: var(--color-text-secondary); white-space: nowrap; text-transform: uppercase; letter-spacing: .04em; }
      .tax-row .form-control { width: 80px; }

      /* ── Remarks block builder ────────────────────────────── */
      .remarks-toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: .4rem;
        padding: .6rem .75rem;
        background: var(--color-surface-raised);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-sm) var(--radius-sm) 0 0;
        border-bottom: none;
      }
      .remarks-block-chip {
        display: inline-flex;
        align-items: center;
        gap: .3rem;
        padding: .25rem .65rem;
        border-radius: 99px;
        font-size: .75rem;
        font-weight: 600;
        cursor: pointer;
        border: 1px solid var(--color-border-strong);
        background: var(--color-surface);
        color: var(--color-text-secondary);
        transition: all .15s;
        user-select: none;
      }
      .remarks-block-chip:hover {
        background: var(--color-primary-muted);
        color: var(--color-primary);
        border-color: var(--color-primary);
      }
      .remarks-active-list {
        min-height: 80px;
        border: 1px solid var(--color-border);
        border-radius: 0 0 var(--radius-sm) var(--radius-sm);
        background: var(--color-surface);
        overflow: hidden;
      }
      .remarks-block-row {
        display: flex;
        align-items: center;
        gap: .4rem;
        padding: .45rem .6rem;
        border-bottom: 1px solid var(--color-border);
        background: var(--color-surface);
        transition: background .1s;
      }
      .remarks-block-row:last-child { border-bottom: none; }
      .remarks-block-row.dragging { opacity: .3; }
      .remarks-block-row.drop-target { border-top: 2px solid var(--color-primary); }
      .block-drag-handle {
        color: var(--color-text-tertiary);
        cursor: grab;
        font-size: .9rem;
        flex-shrink: 0;
        padding: .1rem .05rem;
        line-height: 1;
      }
      .block-drag-handle:active { cursor: grabbing; }
      .block-number {
        font-size: .68rem;
        font-weight: 700;
        color: var(--color-text-tertiary);
        width: 16px;
        text-align: center;
        flex-shrink: 0;
      }
      .block-content { flex: 1; font-size: .8125rem; min-width: 0; line-height: 1.7; }
      .block-content-auto { display: flex; flex-wrap: wrap; align-items: center; gap: .2rem; }
      .block-content-text input {
        width: 100%;
        border: none;
        background: transparent;
        font-size: .8125rem;
        color: var(--color-text);
        outline: none;
        font-family: inherit;
        padding: 0;
      }
      .block-content-text input::placeholder { color: var(--color-text-tertiary); }
      .block-content-text input:focus { border-bottom: 1px solid var(--color-primary); }
      .block-delete {
        width: 22px; height: 22px;
        border-radius: 50%;
        border: none;
        background: transparent;
        color: var(--color-text-tertiary);
        cursor: pointer;
        font-size: .72rem;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
        transition: all .15s;
      }
      .block-delete:hover { background: rgba(239,68,68,.12); color: var(--color-danger); }
      .remarks-empty {
        text-align: center;
        padding: 1.5rem 1rem;
        color: var(--color-text-tertiary);
        font-size: .8rem;
      }
      .remarks-empty i { font-size: 1.5rem; display: block; margin-bottom: .4rem; }
      .remarks-token {
        display: inline-flex;
        align-items: center;
        background-color: var(--color-primary-muted);
        color: var(--color-primary);
        border: 1px solid rgba(22,163,74,.3);
        border-radius: 4px;
        padding: 0 .4rem;
        font-size: .8em;
        font-weight: 700;
        cursor: default;
        user-select: none;
        white-space: nowrap;
        vertical-align: baseline;
        line-height: 1.6;
      }
      .remarks-token::before {
        content: '#';
        opacity: .45;
        font-weight: 400;
        margin-right: .1rem;
      }
      [data-theme="dark"] .remarks-token {
        background-color: rgba(22,163,74,.18);
        color: #4ade80;
        border-color: rgba(22,163,74,.35);
      }
      .remarks-hint {
        font-size: .7rem;
        color: var(--color-text-tertiary);
        margin-top: .3rem;
      }

      /* ── Logo preview ────────────────────────────────── */
      .logo-preview-wrap {
        display: flex;
        align-items: center;
        gap: .75rem;
        margin-top: .5rem;
        min-height: 40px;
      }
      .logo-preview-wrap img {
        max-height: 64px;
        max-width: 140px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--color-border);
        object-fit: contain;
        background: #fff;
        padding: 3px;
      }
      .logo-status {
        font-size: .75rem;
        color: var(--color-text-tertiary);
      }

      /* ── Item cards ───────────────────────────────────── */
      .item-card {
        border: 1px solid var(--color-border);
        border-radius: var(--radius-md);
        margin-bottom: .625rem;
        overflow: hidden;
        background: var(--color-surface);
        box-shadow: var(--shadow-xs);
      }
      .item-card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: .35rem .65rem;
        background: var(--color-surface-raised);
        border-bottom: 1px solid var(--color-border);
      }
      .item-card-num {
        font-size: .7rem;
        font-weight: 700;
        color: var(--color-text-tertiary);
        letter-spacing: .05em;
        text-transform: uppercase;
      }
      .item-card-body {
        padding: .65rem .75rem;
      }
      .item-card-footer {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        padding: .3rem .75rem .5rem;
        font-size: .8rem;
        color: var(--color-text-secondary);
        gap: .35rem;
      }
      .item-card-footer .item-subtotal-val {
        font-weight: 700;
        color: var(--color-primary);
        font-size: .875rem;
      }
      .item-card-drag-handle {
        cursor: grab;
        color: var(--color-text-tertiary);
        font-size: 1rem;
        padding: 0 .15rem;
      }
      .item-card-drag-handle:active { cursor: grabbing; }
      .item-card.drag-over { border: 2px dashed var(--color-primary); }
      #itemsList {
        margin-bottom: .5rem;
      }

      /* ── Responsive ───────────────────────────────────── */
      @media (max-width: 768px) {
        .container { padding: 8px 12px; }
        #submitButton { width: 48px; height: 48px; font-size: 18px; bottom: 14px; right: 14px; }
        .floating-menu { bottom: 76px; right: 14px; }
        .card-body { padding: 1rem; }
      }
      @media (max-width: 576px) {
        .table-responsive { overflow-x: auto; }
      }
    </style>
  </head>

  <body>
    <!-- 主題切換按鈕 -->
    <button class="theme-toggle" id="themeToggle" title="切換深色/淺色主題" aria-label="切換深色/淺色主題">
      <i class="bi bi-sun-fill" id="lightIcon" aria-hidden="true"></i>
      <i class="bi bi-moon-fill" id="darkIcon" style="display: none;" aria-hidden="true"></i>
    </button>
    
    <div class="container my-4">
      <div class="page-title-area">
        <h1>報價單產生器</h1>
        <p>填寫資料後點擊右下角 ✓ 產生報價單</p>
      </div>
      <!-- method="POST" 只是示例，實際動作需搭配後端設定 -->
      <form id="quoteForm" method="POST">
        <div class="row">
          <!-- 左側：基本資料 -->
          <div class="col-lg-6 col-md-12 mb-4">
            <div class="card mb-4">
              <div class="card-header card-header-provider">
                <i class="bi bi-building"></i>
                <h5>乙方資料（報價方）</h5>
              </div>
              <div class="card-body">
                <div class="row">
                  <div class="col-md-12 mb-3">
                    <label for="providerLogo" class="form-label">Logo URL（請注意 CORS 問題）</label>
                    <div class="input-group">
                      <input type="text" class="form-control" id="providerLogo" name="providerLogo" placeholder="例如：https://example.com/logo.png" value="https://ugc.production.linktr.ee/T2LwXZuRACGuwBNY6jQP_ClMq2eT4AEv08bkc" />
                      <label class="btn btn-secondary mb-0" title="從本機上傳 Logo" aria-label="從本機上傳 Logo" style="cursor:pointer;">
                        <i class="bi bi-upload" aria-hidden="true"></i>
                        <input type="file" id="logoFileInput" accept="image/*" style="display:none;" />
                      </label>
                    </div>
                    <div class="logo-preview-wrap">
                      <img id="logoPreviewImg" src="" alt="Logo 預覽" style="display:none;" />
                      <span class="logo-status" id="logoStatus">輸入 URL 或上傳圖片後將顯示預覽</span>
                    </div>
                  </div>
                  <div class="col-md-6 mb-3">
                    <label for="providerName" class="form-label">乙方名稱</label>
                    <input type="text" class="form-control" id="providerName" name="providerName" value="小牛甕烤餅" placeholder="例如：小牛甕烤餅" required />
                  </div>
                  <div class="col-md-6 mb-3">
                    <label for="providerPhone" class="form-label">乙方電話</label>
                    <input type="text" class="form-control" id="providerPhone" name="providerPhone" value="0908809853" placeholder="例如：0908809853" />
                  </div>
                  <div class="col-md-12 mb-3">
                    <label for="providerAddress" class="form-label">乙方地址</label>
                    <input type="text" class="form-control" id="providerAddress" name="providerAddress" value="台中市西區自治街153號一樓" placeholder="例如：台中市西區自治街153號一樓" required />
                  </div>
                  <div class="col-md-6 mb-3">
                    <label for="providerStaffName" class="form-label">承辦人</label>
                    <input type="text" class="form-control" id="providerStaffName" name="providerStaffName" value="劉懿萱" placeholder="例如：劉懿萱" />
                  </div>
                </div>
              </div>
            </div>

            <div class="card mb-4">
              <div class="card-header card-header-customer">
                <i class="bi bi-person-lines-fill"></i>
                <h5>客戶資料</h5>
                <div class="ms-auto d-flex gap-1">
                  <div class="dropdown">
                    <button class="btn btn-sm" style="background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.4);" type="button" id="loadCustomerBtn" data-bs-toggle="dropdown" aria-expanded="false" aria-label="載入常用客戶">
                      <i class="bi bi-person-check" aria-hidden="true"></i>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end" id="savedCustomersList" aria-labelledby="loadCustomerBtn">
                      <li><span class="dropdown-item text-muted" style="font-size:.8rem;">尚無儲存的客戶</span></li>
                    </ul>
                  </div>
                  <button class="btn btn-sm" style="background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.4);" type="button" id="saveCustomerBtn" title="儲存目前客戶資料" aria-label="儲存目前客戶資料">
                    <i class="bi bi-person-plus" aria-hidden="true"></i>
                  </button>
                </div>
              </div>
              <div class="card-body">
                <div class="row">
                  <div class="col-md-6 mb-3">
                    <label for="customerName" class="form-label">客戶名稱</label>
                    <input type="text" class="form-control" id="customerName" name="customerName" placeholder="例如：王小明股份有限公司" required />
                  </div>
                  <div class="col-md-6 mb-3">
                    <label for="customerTaxId" class="form-label">客戶統一編號</label>
                    <input type="text" class="form-control" id="customerTaxId" name="customerTaxId" placeholder="例如：12345678" />
                  </div>
                  <div class="col-md-12 mb-3">
                    <label for="customerAddress" class="form-label">客戶地址</label>
                    <input type="text" class="form-control" id="customerAddress" name="customerAddress" placeholder="例如：台北市大同區小明路9號9樓" />
                  </div>
                  <div class="col-md-6 mb-3">
                    <label for="customerPhone" class="form-label">客戶電話</label>
                    <input type="text" class="form-control" id="customerPhone" name="customerPhone" placeholder="例如：02-12345678" />
                  </div>
                  <div class="col-md-6 mb-3">
                    <label for="customerFax" class="form-label">客戶傳真</label>
                    <input type="text" class="form-control" id="customerFax" name="customerFax" placeholder="例如：02-12345678" />
                  </div>
                  <div class="col-md-12 mb-3">
                    <label for="contactName" class="form-label">聯絡人</label>
                    <div class="input-group">
                      <input type="text" class="form-control" id="contactName" name="contactName" placeholder="例如：王小明" />
                      <select class="form-select" style="max-width: 100px;" id="contactGender" name="contactGender">
                        <option value="先生">先生</option>
                        <option value="小姐">小姐</option>
                      </select>
                    </div>
                  </div>
                  <div class="col-md-6 mb-3">
                    <label for="contactPhone" class="form-label">聯絡人電話</label>
                    <input type="text" class="form-control" id="contactPhone" name="contactPhone" placeholder="例如：0912-345678" />
                  </div>
                </div>
              </div>
            </div>

            <div class="card mb-4">
              <div class="card-header card-header-quote">
                <i class="bi bi-file-earmark-text"></i>
                <h5>報價單資訊</h5>
              </div>
              <div class="card-body">
                <div class="row">
                  <div class="col-md-6 mb-3">
                    <label for="quoteNumber" class="form-label">報價單編號</label>
                    <input type="text" class="form-control" id="quoteNumber" name="quoteNumber" required />
                  </div>
                  <div class="col-md-6 mb-3">
                    <label for="quoteDate" class="form-label">報價日期</label>
                    <input type="date" class="form-control" id="quoteDate" name="quoteDate" required />
                  </div>
                  <div class="col-md-6 mb-3">
                    <label for="orderType" class="form-label">訂單形式</label>
                    <select class="form-control" id="orderType" name="orderType">
                      <option value="自取">自取</option>
                      <option value="外送">外送</option>
                      <option value="冷凍宅配">冷凍宅配</option>
                      <option value="7-11冷凍店到店">7-11冷凍店到店</option>
                      <option value="全家冷凍店到店">全家冷凍店到店</option>
                    </select>
                  </div>
                  <div class="col-md-6 mb-3">
                    <label for="deliveryDate" class="form-label">外送日期</label>
                    <input type="date" class="form-control" id="deliveryDate" name="deliveryDate" onchange="updateDeliveryDay()" />
                  </div>
                  <div class="col-md-6 mb-3">
                    <label for="deliveryDay" class="form-label">外送星期</label>
                    <input type="text" class="form-control" id="deliveryDay" name="deliveryDay" readonly />
                  </div>
                  <div class="col-md-6 mb-3">
                    <label for="deliveryTime" class="form-label">外送時間</label>
                    <input type="text" class="form-control" id="deliveryTime" name="deliveryTime" placeholder="例如：15:30" />
                  </div>
                  <div class="col-md-6 mb-3">
                    <label for="validDays" class="form-label">報價單有效天數</label>
                    <select class="form-control" id="validDays" name="validDays">
                      <option value="7">7天</option>
                      <option value="14">14天</option>
                      <option value="30">30天</option>
                      <option value="60">60天</option>
                      <option value="90">90天</option>
                    </select>
                  </div>
                  <div class="col-md-6 mb-3">
                    <label for="deliveryStoreName" class="form-label">外送地點名稱</label>
                    <input type="text" class="form-control" id="deliveryStoreName" name="deliveryStoreName" placeholder="例如：林酒店" />
                  </div>
                  <div class="col-md-12 mb-3">
                    <label for="contactAddress" class="form-label">外送地址</label>
                    <input type="text" class="form-control" id="contactAddress" name="contactAddress" placeholder="例如：台中市西屯區朝富路99號" />
                  </div>
                  <div class="col-md-12 mb-3">
                    <label class="form-label">備註</label>
                    <!-- 積木工具列 -->
                    <div class="remarks-toolbar" id="remarksToolbar"></div>
                    <!-- 已加入的積木清單 -->
                    <div class="remarks-active-list" id="remarksActiveList"></div>
                    <p class="remarks-hint"><i class="bi bi-grip-vertical me-1"></i>點擊上方積木新增，拖曳調整順序，綠色標籤自動同步欄位</p>
                    <!-- 隱藏欄位供表單提交 -->
                    <textarea id="remarks" name="remarks" class="d-none"></textarea>
                    <input type="hidden" id="remarksTemplate" name="remarksTemplate">
                  </div>
                </div>
              </div>
            </div>
          </div>
          <!-- 右側：品項明細與金額 -->
          <div class="col-lg-6 col-md-12">
            <div class="card mb-4">
              <div class="card-header card-header-items">
                <i class="bi bi-cart3"></i>
                <h5>品項細節</h5>
              </div>
              <div class="card-body">
                <div class="add-item-row">
                  <button type="button" id="addBakeryButton" class="btn btn-add-bakery">
                    <i class="bi bi-plus-lg me-1"></i>烤餅
                  </button>
                  <button type="button" id="addDrinkButton" class="btn btn-add-drink">
                    <i class="bi bi-plus-lg me-1"></i>飲料
                  </button>
                  <button type="button" id="addOtherButton" class="btn btn-add-other">
                    <i class="bi bi-plus-lg me-1"></i>其他
                  </button>
                  <button type="button" id="refreshButton" class="btn-refresh" title="刷新合計" aria-label="刷新合計">
                    <i class="bi bi-arrow-clockwise" aria-hidden="true"></i>
                  </button>
                </div>
                <!-- 稅金設定列（移到品項上方） -->
                <div class="d-flex align-items-center gap-2 mb-2" style="font-size:.8125rem; color:var(--color-text-secondary);">
                  <label for="taxPercent" class="mb-0 fw-semibold">稅金</label>
                  <input type="number" id="taxPercent" name="taxPercent" class="form-control" style="width:72px;" value="0" min="0" max="100" step="1" aria-label="稅率百分比">
                  <span>%</span>
                </div>
                <div id="itemsList">
                  <div id="emptyState">
                    <div class="items-empty">
                      <i class="bi bi-basket"></i>
                      <p>尚未新增任何品項<br>點擊上方按鈕開始新增</p>
                    </div>
                  </div>
                </div>
                <table class="table table-bordered" id="itemsSummaryTable" style="margin-bottom:0">
                  <tfoot>
                    <tr class="subtotal">
                      <td class="text-end">小計</td>
                      <td style="width:110px">$<span id="subtotalDisplay">0</span></td>
                    </tr>
                    <tr class="tax">
                      <td class="text-end">稅金 (<span id="taxPercentDisplay">0</span>%)</td>
                      <td>$<span id="taxDisplay">0</span></td>
                    </tr>
                    <tr class="total">
                      <td class="text-end">總計</td>
                      <td>$<span id="totalDisplay">0</span></td>
                    </tr>
                  </tfoot>
                </table>
              </div>
            </div>
            <!-- 浮動的圓形提交按鈕 -->
            <button type="submit" id="submitButton" class="btn btn-success rounded-circle position-fixed" aria-label="產生報價單">
              <span aria-hidden="true">&#10003;</span>
            </button>
          </div>
        </div>
        <div class="col-12 mt-2">
          <div class="sys-section">
            <hr>
            <h3>系統功能</h3>
            <div class="sys-btn-group">
              <button type="button" class="btn btn-outline-primary" data-bs-toggle="modal" data-bs-target="#exportModal">
                <i class="bi bi-box-arrow-up me-1"></i>匯出 JSON
              </button>
              <button type="button" class="btn btn-outline-primary" data-bs-toggle="modal" data-bs-target="#importModal">
                <i class="bi bi-box-arrow-in-down me-1"></i>匯入 JSON
              </button>
              <button type="button" class="btn btn-outline-primary" data-bs-toggle="modal" data-bs-target="#localStorageModal">
                <i class="bi bi-database me-1"></i>本地儲存管理
              </button>
              <button type="button" class="btn btn-outline-danger" id="sysResetBtn">
                <i class="bi bi-arrow-counterclockwise me-1" aria-hidden="true"></i>重置表單
              </button>
            </div>
          </div>
        </div>
      </form>
    </div>

    <!-- 浮動按鈕菜單 -->
    <div class="floating-menu">
      <button type="button" class="btn-floating float-reset" id="floatResetBtn" title="重置所有資料" aria-label="重置所有資料">
        <i class="bi bi-arrow-counterclockwise" aria-hidden="true"></i>
      </button>
      <button type="button" class="btn-floating float-export" data-bs-toggle="modal" data-bs-target="#exportModal" title="匯出 JSON" aria-label="匯出 JSON">
        <i class="bi bi-box-arrow-up" aria-hidden="true"></i>
      </button>
      <button type="button" class="btn-floating float-import" data-bs-toggle="modal" data-bs-target="#importModal" title="匯入 JSON" aria-label="匯入 JSON">
        <i class="bi bi-box-arrow-in-down" aria-hidden="true"></i>
      </button>
      <button type="button" class="btn-floating float-storage" data-bs-toggle="modal" data-bs-target="#localStorageModal" title="本地儲存管理" aria-label="本地儲存管理">
        <i class="bi bi-database" aria-hidden="true"></i>
      </button>
    </div>

    <!-- 匯出 JSON 模態框 -->
    <div class="modal fade" id="exportModal" tabindex="-1" aria-labelledby="exportModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="exportModalLabel">匯出 JSON</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <textarea class="form-control" id="exportedJson" rows="10" readonly></textarea>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">關閉</button>
            <button type="button" class="btn btn-primary" id="exportUpdateBtn">
              <i class="bi bi-arrow-clockwise" aria-hidden="true"></i> 更新
            </button>
            <button type="button" class="btn btn-success" id="exportCopyBtn">
              <i class="bi bi-clipboard" aria-hidden="true"></i> 複製
            </button>
            <button type="button" class="btn btn-info" id="exportDownloadBtn">
              <i class="bi bi-download" aria-hidden="true"></i> 下載
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- 匯入 JSON 模態框 -->
    <div class="modal fade" id="importModal" tabindex="-1" aria-labelledby="importModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="importModalLabel">匯入 JSON</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <textarea class="form-control" id="importJson" rows="10" placeholder="請貼上 JSON"></textarea>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">關閉</button>
            <button type="button" class="btn btn-primary" id="importSubmitBtn">匯入</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 本地儲存管理模態框 -->
    <div class="modal fade" id="localStorageModal" tabindex="-1" aria-labelledby="localStorageModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="localStorageModalLabel">本地儲存管理</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <p>您的表單數據會自動保存在瀏覽器的本地儲存中。</p>
            <div class="alert alert-warning">
              <strong>注意：</strong> 清除瀏覽器緩存或使用隱私模式可能會導致數據丟失。
            </div>
            
            <div class="mb-4">
              <h5>主題設置</h5>
              <div class="btn-group w-100 mb-3">
                <button type="button" class="btn btn-outline-primary" id="themeLightBtn">
                  <i class="bi bi-sun-fill" aria-hidden="true"></i> 淺色主題
                </button>
                <button type="button" class="btn btn-outline-primary" id="themeDarkBtn">
                  <i class="bi bi-moon-fill" aria-hidden="true"></i> 深色主題
                </button>
                <button type="button" class="btn btn-outline-primary" id="themeAutoBtn">
                  <i class="bi bi-circle-half" aria-hidden="true"></i> 跟隨系統
                </button>
              </div>
            </div>
            
            <h5>數據管理</h5>
            <div class="d-grid gap-2">
              <button type="button" class="btn btn-primary" id="manualSaveBtn">
                <i class="bi bi-save" aria-hidden="true"></i> 手動保存當前表單
              </button>
              <button type="button" class="btn btn-danger" id="clearStorageBtn">
                <i class="bi bi-trash" aria-hidden="true"></i> 清除本地儲存數據
              </button>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">關閉</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 通用確認對話框 -->
    <div class="modal fade" id="confirmModal" tabindex="-1" aria-labelledby="confirmModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-sm modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="confirmModalLabel">確認</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="關閉"></button>
          </div>
          <div class="modal-body" id="confirmModalBody"></div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" id="confirmModalCancel" data-bs-dismiss="modal">取消</button>
            <button type="button" class="btn btn-danger" id="confirmModalOk">確定</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 通用提示對話框 -->
    <div class="modal fade" id="alertModal" tabindex="-1" aria-labelledby="alertModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-sm modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="alertModalLabel">提示</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="關閉"></button>
          </div>
          <div class="modal-body" id="alertModalBody"></div>
          <div class="modal-footer">
            <button type="button" class="btn btn-primary" data-bs-dismiss="modal">確定</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 通用品項模板 -->
    <script type="text/template" id="itemTemplate">
      <div class="item-card" draggable="true">
        <div class="item-card-header">
          <span class="item-card-drag-handle" title="拖曳排序" aria-hidden="true"><i class="bi bi-grip-vertical"></i></span>
          <span class="item-card-num">品項</span>
          <button type="button" class="btn btn-danger btn-sm ms-auto" onclick="removeRow(this)" title="刪除此品項" aria-label="刪除此品項">X</button>
        </div>
        <div class="item-card-body">
          <div class="row g-2">
            <div class="col-sm-6">
              <label class="form-label">品名</label>
              {{typeContent}}
            </div>
            <div class="col-sm-6">
              <label class="form-label">項目</label>
              {{nameContent}}
            </div>
            <div class="col-6">
              <label class="form-label">數量</label>
              <input type="number" class="form-control item-qty-input" name="item_{{item_id}}_quantity" step="1" min="1" value="{{defaultQty}}" required />
            </div>
            <div class="col-6">
              <label class="form-label">單價</label>
              <input type="number" class="form-control item-price-input" name="item_{{item_id}}_price" step="1" value="{{defaultPrice}}" required />
            </div>
          </div>
        </div>
        <div class="item-card-footer">
          <span>小計</span>
          <span class="item-subtotal-val">$<span class="item-subtotal">{{defaultSubtotal}}</span></span>
        </div>
      </div>
    </script>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- Bootstrap JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    // 菜單配置
    const MENU_CONFIG = {
      bakery: [
        { value: "蔥油蘿蔔", label: "蔥油蘿蔔", price: 30 },
        { value: "香椿蘿蔔", label: "香椿蘿蔔", price: 30 },
        { value: "黃金糖", label: "黃金糖", price: 30 },
        { value: "紅豆泥", label: "紅豆泥", price: 30 },
        { value: "芋仔泥", label: "芋仔泥", price: 30 },
        { value: "黑芝麻", label: "黑芝麻", price: 30 },
        { value: "綠豆沙", label: "綠豆沙", price: 30 },
      ],
      drink: [
        { value: "豆漿(杯)", label: "豆漿(杯)", price: 15 },
        { value: "豆漿(袋)", label: "豆漿(袋)", price: 45 },
        { value: "黑芝麻堅果飲(袋)", label: "黑芝麻堅果飲(袋)", price: 60 }
      ],
      drinkCustomize: {
        sweetness: [
          { value: "無糖", label: "無糖" },
          { value: "微糖", label: "微糖" },
          { value: "正常糖", label: "正常糖" }
        ],
        temperature: [
          { value: "冰", label: "冰" },
          { value: "熱", label: "熱" }
        ]
      },
      other: [
        { value: "其他項目", label: "其他項目" },
        { value: "服務費", label: "服務費" },
        { value: "運費", label: "運費" },
        { value: "包裝費", label: "包裝費" },
        { value: "折扣", label: "折扣" }
      ]
    };

    // 設定日期預設值：今天
    function setDefaultDates() {
      const today = new Date();
      const yyyy = today.getFullYear();
      const mm = String(today.getMonth() + 1).padStart(2, "0");
      const dd = String(today.getDate()).padStart(2, "0");
      $("#quoteDate").val(`${yyyy}-${mm}-${dd}`);
    }

    // 產生報價單編號
    function generateQuoteNumber() {
      const now = new Date();
      const yy = String(now.getFullYear()).slice(-2);
      const mm = String(now.getMonth() + 1).padStart(2, "0");
      const dd = String(now.getDate()).padStart(2, "0");
      const hh = String(now.getHours()).padStart(2, "0");
      const min = String(now.getMinutes()).padStart(2, "0");
      const rand = Math.floor(Math.random() * 10);
      return "EST" + yy + mm + dd + hh + min + rand;
    }

    // 切換空狀態顯示
    function toggleEmptyState() {
      const hasItems = $('#itemsList .item-card').length > 0;
      $('#emptyState').toggle(!hasItems);
    }

    // 合併後的通用添加項目函數
    function addItem(type) {
      let templateHtml = $("#itemTemplate").html();
      const item_id = Math.random().toString(36).substring(2, 15);
      let typeContent = '', nameContent = '', defaultQty = '1', defaultPrice = '0';
      
      switch(type) {
        case 'bakery':
          typeContent = `<div class="d-flex flex-wrap">
            <div class="form-check me-3 mb-2">
              <input class="form-check-input" type="radio" name="item_${item_id}_type" value="現烤烤餅" id="itemType_${item_id}_1" checked>
              <label class="form-check-label" for="itemType_${item_id}_1">現烤烤餅</label>
            </div>
            <div class="form-check me-3 mb-2">
              <input class="form-check-input" type="radio" name="item_${item_id}_type" value="冷凍烤餅" id="itemType_${item_id}_2">
              <label class="form-check-label" for="itemType_${item_id}_2">冷凍烤餅</label>
            </div>
          </div>`;
          
          let bakeryOptions = MENU_CONFIG.bakery.map(item => 
            `<option value="${item.value}" data-price="${item.price}">${item.label}</option>`
          ).join('');
          
          nameContent = `<select class="form-select" name="item_${item_id}_name" onchange="updateBakeryPrice(this)">
            ${bakeryOptions}
          </select>`;
          defaultPrice = MENU_CONFIG.bakery[0].price.toString();
          break;
          
        case 'drink':
          typeContent = `<input type="hidden" name="item_${item_id}_type" value="飲料">
            <div class="form-control">飲料</div>`;
          
          let drinkOptions = MENU_CONFIG.drink.map(item => 
            `<option value="${item.value}" data-price="${item.price}">${item.label}</option>`
          ).join('');
          
          let sweetnessOptions = MENU_CONFIG.drinkCustomize.sweetness.map(item => 
            `<option value="${item.value}">${item.label}</option>`
          ).join('');
          
          let temperatureOptions = MENU_CONFIG.drinkCustomize.temperature.map(item => 
            `<option value="${item.value}">${item.label}</option>`
          ).join('');
          
          nameContent = `
            <div class="row">
              <div class="col-12 mb-2">
                <select class="form-select" name="item_${item_id}_name" onchange="updateDrinkPrice(this)">
                  ${drinkOptions}
                </select>
              </div>
              <div class="col-6">
                <select class="form-select form-select-sm" name="item_${item_id}_sweetness">
                  <option value="">-- 甜度 --</option>${sweetnessOptions}
                </select>
              </div>
              <div class="col-6">
                <select class="form-select form-select-sm" name="item_${item_id}_temperature">
                  <option value="">-- 溫度 --</option>${temperatureOptions}
                </select>
              </div>
            </div>
            <textarea class="form-control mt-2" name="item_${item_id}_description" placeholder="請輸入其他備註" rows="1"></textarea>`;
          defaultPrice = MENU_CONFIG.drink[0].price.toString();
          break;
          
        case 'other':
          typeContent = `<input type="hidden" name="item_${item_id}_type" value="其他">
            <div class="form-control">其他</div>`;
          
          let otherOptions = MENU_CONFIG.other.map(item => 
            `<option value="${item.value}">${item.label}</option>`
          ).join('');
          
          nameContent = `<select class="form-select" name="item_${item_id}_name" onchange="handleOtherNameChange(this)">${otherOptions}</select>
            <textarea class="form-control mt-2" name="item_${item_id}_description" placeholder="請輸入描述" rows="1"></textarea>`;
          break;
      }
      
      const defaultSubtotal = (parseInt(defaultQty) * parseInt(defaultPrice || '0')).toLocaleString();
      templateHtml = templateHtml
        .replace(/{{typeContent}}/g, typeContent)
        .replace(/{{nameContent}}/g, nameContent)
        .replace(/{{defaultQty}}/g, defaultQty)
        .replace(/{{defaultPrice}}/g, defaultPrice)
        .replace(/{{defaultSubtotal}}/g, defaultSubtotal)
        .replace(/{{item_id}}/g, item_id);

      $('#emptyState').before(templateHtml);
      // 初始化新卡片的拖曳
      const newCard = $('#itemsList .item-card').last()[0];
      if (newCard) initItemCardDrag(newCard);
      renumberItemCards();
      toggleEmptyState();
      updateTotals();

      // 自動保存
      saveFormDataToLocalStorage();

      return item_id;
    }

    // 刪除行
    function removeRow(button) {
      $(button).closest(".item-card").remove();
      renumberItemCards();
      toggleEmptyState();
      updateTotals();

      // 自動保存
      saveFormDataToLocalStorage();
    }

    // 重新編號品項卡標題
    function renumberItemCards() {
      $('#itemsList .item-card').each(function(i) {
        $(this).find('.item-card-num').text('品項 ' + (i + 1));
      });
    }

    // 品項卡拖曳排序
    let _itemDragSrc = null;

    function initItemCardDrag(cardEl) {
      cardEl.addEventListener('dragstart', function(e) {
        _itemDragSrc = this;
        e.dataTransfer.effectAllowed = 'move';
        setTimeout(() => $(this).css('opacity', '0.4'), 0);
      });
      cardEl.addEventListener('dragend', function() {
        $(this).css('opacity', '');
        $('#itemsList .item-card').removeClass('drag-over');
        _itemDragSrc = null;
      });
      cardEl.addEventListener('dragover', function(e) {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        if (this !== _itemDragSrc) {
          $('#itemsList .item-card').removeClass('drag-over');
          $(this).addClass('drag-over');
        }
      });
      cardEl.addEventListener('dragleave', function() {
        $(this).removeClass('drag-over');
      });
      cardEl.addEventListener('drop', function(e) {
        e.preventDefault();
        $(this).removeClass('drag-over');
        if (_itemDragSrc && _itemDragSrc !== this) {
          const $list = $('#itemsList');
          const $src = $(_itemDragSrc);
          const $target = $(this);
          const srcIdx = $list.find('.item-card').index($src);
          const tgtIdx = $list.find('.item-card').index($target);
          if (srcIdx < tgtIdx) $target.after($src);
          else $target.before($src);
          renumberItemCards();
          saveFormDataToLocalStorage();
        }
      });
    }

    // 計算小計、稅金、總計（同時更新各品項小計）
    function updateTotals() {
      let subtotal = 0;
      $("input[name$='_quantity']").each(function() {
        const qty = parseInt($(this).val()) || 0;
        const name = $(this).attr('name');
        const idMatch = name.match(/item_([a-z0-9]+)_quantity/);

        if (idMatch && idMatch[1]) {
          const itemId = idMatch[1];
          const priceInput = $(`input[name="item_${itemId}_price"]`);
          if (priceInput.length) {
            const price = parseInt(priceInput.val()) || 0;
            const lineTotal = qty * price;
            subtotal += lineTotal;
            // 更新品項小計
            $(this).closest('.item-card').find('.item-subtotal').text(lineTotal.toLocaleString());
          }
        }
      });

      const taxPercent = parseInt($("#taxPercent").val()) || 0;
      const tax = Math.floor((subtotal * taxPercent) / 100);
      const total = subtotal + tax;

      $("#subtotalDisplay").text(subtotal.toLocaleString());
      $("#taxDisplay").text(tax.toLocaleString());
      $("#totalDisplay").text(total.toLocaleString());
      $("#taxPercentDisplay").text(taxPercent);
    }

    // 事件處理函數
    function handleBlurSetZero() {
      if ($(this).val().trim() === "") $(this).val("0");
      updateTotals();
    }

    function handleBlurSetOne() {
      if ($(this).val().trim() === "" || $(this).val().trim() === "0") $(this).val("1");
      updateTotals();
    }

    // 根據日期更新星期幾，並同步 token
    function updateDeliveryDay() {
      const deliveryDateInput = document.getElementById('deliveryDate');
      const deliveryDayInput = document.getElementById('deliveryDay');

      if (deliveryDateInput.value) {
        const date = new Date(deliveryDateInput.value);
        const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
        deliveryDayInput.value = weekdays[date.getDay()];
      } else {
        deliveryDayInput.value = '';
      }
      updateRemarksToken('deliveryDate');
      updateRemarksToken('deliveryDay');
    }

    // ── Remarks block builder ───────────────────────────────
    const REMARK_BLOCK_DEFS = [
      { id:'deliveryTime',    label:'外送時間', icon:'bi-clock',         type:'auto', template:'外送時間：{{deliveryDate}}({{deliveryDay}}){{deliveryTime}}' },
      { id:'deliveryAddress', label:'外送地址', icon:'bi-geo-alt-fill',  type:'auto', template:'外送地址：{{contactAddress}}({{deliveryStoreName}})' },
      { id:'validDays',       label:'有效天數', icon:'bi-calendar-check',type:'auto', template:'本報價單限報價日期起{{validDays}}天內有效' },
      { id:'packaging',       label:'包裝說明', icon:'bi-box-seam',      type:'text', defaultContent:'四兩防油紙袋單顆包裝' },
      { id:'deposit',         label:'訂金說明', icon:'bi-cash-coin',     type:'text', defaultContent:'訂金為總金額50%，於出貨日三天前付款' },
      { id:'custom',          label:'自訂文字', icon:'bi-pencil',        type:'text', defaultContent:'' }
    ];

    const REMARKS_TOKEN_FIELDS = ['deliveryDate','deliveryDay','deliveryTime','contactAddress','deliveryStoreName','validDays'];

    let activeRemarksBlocks = [];
    let _dragSrcIdx = null;

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function _makeInstance(def, content) {
      return {
        instanceId: Math.random().toString(36).slice(2,10),
        defId: def.id,
        type: def.type,
        content: content !== undefined ? content : (def.defaultContent || '')
      };
    }

    function _defaultBlocks() {
      return ['deliveryTime','deliveryAddress','packaging','deposit','validDays']
        .map(id => _makeInstance(REMARK_BLOCK_DEFS.find(d => d.id === id)));
    }

    // 將 template 裡的 {{fieldId}} 渲染成 badge span
    function _templateToHtml(template) {
      let html = escHtml(template);
      REMARKS_TOKEN_FIELDS.forEach(function(field) {
        const val = $('#' + field).val() || '';
        html = html.replace(
          new RegExp('\\{\\{' + field + '\\}\\}', 'g'),
          '<span class="remarks-token" data-field="' + field + '">' + escHtml(val) + '</span>'
        );
      });
      return html;
    }

    // 渲染工具列積木
    function renderRemarksToolbar() {
      const $tb = $('#remarksToolbar').empty();
      REMARK_BLOCK_DEFS.forEach(function(def) {
        $('<button type="button" class="remarks-block-chip">')
          .html('<i class="bi ' + def.icon + '"></i> ' + def.label)
          .on('click', function() { addRemarksBlock(def.id); })
          .appendTo($tb);
      });
    }

    // 渲染已加入的積木清單
    function renderActiveBlocks() {
      const $list = $('#remarksActiveList').empty();

      if (!activeRemarksBlocks.length) {
        $list.html('<div class="remarks-empty"><i class="bi bi-chat-square-dots"></i>點擊上方積木加入備註行</div>');
        syncRemarksHidden();
        return;
      }

      activeRemarksBlocks.forEach(function(block, idx) {
        const def = REMARK_BLOCK_DEFS.find(d => d.id === block.defId);
        let contentHtml;
        if (block.type === 'auto') {
          contentHtml = '<div class="block-content-auto">' + _templateToHtml(def.template) + '</div>';
        } else {
          contentHtml = '<div class="block-content-text"><input type="text" value="' + escHtml(block.content) + '" placeholder="輸入備註文字…" data-iid="' + block.instanceId + '"></div>';
        }

        const $row = $([
          '<div class="remarks-block-row" draggable="true" data-idx="' + idx + '">',
          '  <span class="block-drag-handle"><i class="bi bi-grip-vertical"></i></span>',
          '  <span class="block-number">' + (idx + 1) + '</span>',
          '  <div class="block-content">' + contentHtml + '</div>',
          '  <button type="button" class="block-delete" data-iid="' + block.instanceId + '" title="移除"><i class="bi bi-x-lg"></i></button>',
          '</div>'
        ].join(''));

        // 文字積木：即時同步 content
        $row.find('input').on('input', function() {
          const b = activeRemarksBlocks.find(b => b.instanceId === $(this).data('iid'));
          if (b) b.content = $(this).val();
          syncRemarksHidden();
        });

        // 刪除
        $row.find('.block-delete').on('click', function() {
          activeRemarksBlocks = activeRemarksBlocks.filter(b => b.instanceId !== $(this).data('iid'));
          renderActiveBlocks();
          saveFormDataToLocalStorage();
        });

        // 拖曳
        const el = $row[0];
        el.addEventListener('dragstart', function(e) {
          _dragSrcIdx = parseInt($(this).data('idx'));
          e.dataTransfer.effectAllowed = 'move';
          setTimeout(() => $(this).addClass('dragging'), 0);
        });
        el.addEventListener('dragend', function() {
          $(this).removeClass('dragging');
          $('#remarksActiveList .drop-target').removeClass('drop-target');
        });
        el.addEventListener('dragover', function(e) {
          e.preventDefault();
          $('#remarksActiveList .drop-target').removeClass('drop-target');
          if (parseInt($(this).data('idx')) !== _dragSrcIdx) $(this).addClass('drop-target');
        });
        el.addEventListener('drop', function(e) {
          e.preventDefault();
          const targetIdx = parseInt($(this).data('idx'));
          if (_dragSrcIdx !== null && _dragSrcIdx !== targetIdx) {
            const moved = activeRemarksBlocks.splice(_dragSrcIdx, 1)[0];
            const insertAt = _dragSrcIdx < targetIdx ? targetIdx - 1 : targetIdx;
            activeRemarksBlocks.splice(insertAt, 0, moved);
            _dragSrcIdx = null;
            renderActiveBlocks();
            saveFormDataToLocalStorage();
          }
        });

        $list.append($row);
      });

      syncRemarksHidden();
    }

    // 新增積木
    function addRemarksBlock(defId) {
      const def = REMARK_BLOCK_DEFS.find(d => d.id === defId);
      if (!def) return;
      activeRemarksBlocks.push(_makeInstance(def));
      renderActiveBlocks();
      saveFormDataToLocalStorage();
    }

    // 更新指定 token badge 的文字（field 值改變時呼叫）
    function updateRemarksToken(fieldId) {
      const val = $('#' + fieldId).val() || '';
      $('#remarksActiveList .remarks-token[data-field="' + fieldId + '"]').text(val);
      syncRemarksHidden();
    }

    // 同步 hidden textarea & template JSON
    function syncRemarksHidden() {
      const lines = activeRemarksBlocks.map(function(block, i) {
        const prefix = '(' + (i + 1) + ')、';
        if (block.type === 'auto') {
          const def = REMARK_BLOCK_DEFS.find(d => d.id === block.defId);
          if (!def) return prefix;
          let t = def.template;
          REMARKS_TOKEN_FIELDS.forEach(function(f) {
            t = t.replace(new RegExp('\\{\\{' + f + '\\}\\}', 'g'), $('#' + f).val() || '');
          });
          return prefix + t;
        }
        return prefix + block.content;
      });
      $('#remarks').val(lines.join('\n'));
      $('#remarksTemplate').val(JSON.stringify(activeRemarksBlocks.map(function(b) {
        return { defId: b.defId, type: b.type, content: b.content };
      })));
    }

    // 初始化積木編輯器
    function initRemarksBlocks(savedData) {
      if (savedData) {
        try {
          const arr = typeof savedData === 'string' ? JSON.parse(savedData) : savedData;
          activeRemarksBlocks = arr.map(function(b) {
            return _makeInstance(
              REMARK_BLOCK_DEFS.find(d => d.id === b.defId) || { id: b.defId, type: b.type, defaultContent: b.content },
              b.content
            );
          });
        } catch(e) { activeRemarksBlocks = _defaultBlocks(); }
      } else {
        activeRemarksBlocks = _defaultBlocks();
      }
      renderActiveBlocks();
    }


    // 表單提交前檢查
    function validateForm() {
      if ($("#itemsList .item-card").length === 0) {
        showAlert("請至少添加一個品項", "缺少品項");
        return false;
      }
      return true;
    }

    // 定義表單欄位配置
    const FORM_FIELDS = {
      provider: [
        { id: "providerLogo", defaultValue: "https://ugc.production.linktr.ee/T2LwXZuRACGuwBNY6jQP_ClMq2eT4AEv08bkc" },
        { id: "providerName", defaultValue: "小牛甕烤餅" },
        { id: "providerAddress", defaultValue: "台中市西區自治街153號一樓" },
        { id: "providerPhone", defaultValue: "0908809853" },
        { id: "providerStaffName", defaultValue: "劉懿萱" }
      ],
      customer: [
        { id: "customerName", defaultValue: "" }, { id: "customerAddress", defaultValue: "" },
        { id: "customerPhone", defaultValue: "" }, { id: "customerFax", defaultValue: "" },
        { id: "customerTaxId", defaultValue: "" }
      ],
      contact: [
        { id: "contactName", defaultValue: "" }, { id: "contactPhone", defaultValue: "" },
        { id: "contactGender", defaultValue: "先生" }, { id: "contactAddress", defaultValue: "" }
      ],
      quote: [
        { id: "orderType", defaultValue: "外送" }, { id: "quoteNumber", defaultValue: "" },
        { id: "quoteDate", defaultValue: "" }, { id: "deadline", defaultValue: "" },
        { id: "deliveryDate", defaultValue: "" }, { id: "deliveryDay", defaultValue: "" },
        { id: "deliveryTime", defaultValue: "" }, { id: "deliveryStoreName", defaultValue: "" },
        { id: "taxPercent", defaultValue: "0" }, { id: "remarks", defaultValue: "" },
        { id: "validDays", defaultValue: "7" }, { id: "remarksTemplate", defaultValue: "" }
      ]
    };

    // 獲取所有表單欄位的平面列表
    function getAllFormFields() {
      return Object.values(FORM_FIELDS).flat();
    }

    // 匯出表單數據為 JSON
    function exportFormData() {
      const formData = {};
      getAllFormFields().forEach(field => {
        const elementId = field.id;
        const jsonKey = field.jsonKey || elementId;
        formData[jsonKey] = $(`#${elementId}`).val();
      });
      
      formData.items = [];
      const itemsMap = new Map();
      
      $("[name^='item_']").each(function() {
        const name = $(this).attr('name');
        const value = $(this).val();
        const parts = name.split('_');
        if (parts.length >= 3) {
          const id = parts[1];
          const fieldName = parts.slice(2).join('_');
          if (!itemsMap.has(id)) itemsMap.set(id, {});
          itemsMap.get(id)[fieldName] = value;
        }
      });
      
      for (const [id, item] of itemsMap) {
        const type = item.type || '現烤烤餅';
        const name = item.name || '';
        const desc = item.description || '';
        const qty = parseInt(item.quantity, 10) || 0;
        const price = parseInt(item.price, 10) || 0;
        
        const itemObj = { type, name, desc, qty, price };
        if (type === '飲料') {
          itemObj.customOptions = {
            sweetness: item.sweetness || '',
            temperature: item.temperature || ''
          };
        }
        formData.items.push(itemObj);
      }

      $("#exportedJson").val(JSON.stringify(formData, null, 2));
      
      // 保存到 localStorage
      saveFormDataToLocalStorage(formData);
      
      return formData;
    }

    // 匯入 JSON 到表單
    function importFormData() {
      const jsonText = $("#importJson").val();
      if (!jsonText || jsonText.trim() === '') {
        showAlert("請先貼上 JSON 數據");
        return;
      }
      
      try {

        performLocalImport(data);

        $('#importModal').modal('hide');

        showAlert("JSON 格式錯誤，請確認格式是否正確");
      }

    // 本地匯入 JSON 數據
    function performLocalImport(data) {
      try {
        getAllFormFields().forEach(field => {
          const elementId = field.id;
          const jsonKey = field.jsonKey || elementId;
          if (data[jsonKey] !== undefined) $(`#${elementId}`).val(data[jsonKey]);
        });
        
        $("#itemsList .item-card").remove();

        if (data.items && Array.isArray(data.items)) {
          data.items.forEach(function(item) {
            let itemType = 'other';
            if (item.type && item.type.includes('烤餅')) itemType = 'bakery';
            else if (item.type && item.type.includes('飲料')) itemType = 'drink';

            const item_id = addItem(itemType);
            const $itemCard = $("#itemsList .item-card").last();

            if (itemType === 'bakery') {
              if (item.type === '冷凍烤餅') {
                $itemCard.find(`input[name="item_${item_id}_type"][value="冷凍烤餅"]`).prop('checked', true);
              } else {
                $itemCard.find(`input[name="item_${item_id}_type"][value="現烤烤餅"]`).prop('checked', true);
              }
            } else {
              const typeInput = $itemCard.find(`input[name="item_${item_id}_type"]`);
              if (typeInput.length) {
                typeInput.val(item.type || (itemType === 'drink' ? '飲料' : '其他'));
              }
            }

            const nameSelect = $itemCard.find(`select[name="item_${item_id}_name"]`);
            if (nameSelect.length && item.name) {
              if (nameSelect.find(`option[value="${item.name}"]`).length) {
                nameSelect.val(item.name);
              } else {
                nameSelect.append(new Option(item.name, item.name));
                nameSelect.val(item.name);
              }
            }

            if (itemType === 'drink' && item.customOptions) {
              if (item.customOptions.sweetness) {
                const sweetnessSelect = $itemCard.find(`select[name="item_${item_id}_sweetness"]`);
                if (sweetnessSelect.length) {
                  if (sweetnessSelect.find(`option[value="${item.customOptions.sweetness}"]`).length) {
                    sweetnessSelect.val(item.customOptions.sweetness);
                  } else {
                    sweetnessSelect.append(new Option(item.customOptions.sweetness, item.customOptions.sweetness));
                    sweetnessSelect.val(item.customOptions.sweetness);
                  }
                }
              }

              if (item.customOptions.temperature) {
                const temperatureSelect = $itemCard.find(`select[name="item_${item_id}_temperature"]`);
                if (temperatureSelect.length) {
                  if (temperatureSelect.find(`option[value="${item.customOptions.temperature}"]`).length) {
                    temperatureSelect.val(item.customOptions.temperature);
                  } else {
                    temperatureSelect.append(new Option(item.customOptions.temperature, item.customOptions.temperature));
                    temperatureSelect.val(item.customOptions.temperature);
                  }
                }
              }
            }

            const descTextarea = $itemCard.find(`textarea[name="item_${item_id}_description"]`);
            if (descTextarea.length && item.desc) descTextarea.val(item.desc);

            $itemCard.find(`input[name="item_${item_id}_quantity"]`).val(item.qty || 0);
            $itemCard.find(`input[name="item_${item_id}_price"]`).val(item.price || 0);
          });
        }

        // 為所有恢復的品項卡初始化拖曳
        $('#itemsList .item-card').each(function() { initItemCardDrag(this); });
        renumberItemCards();
        if (data.deliveryDate) updateDeliveryDay();
        toggleEmptyState();
        updateTotals();

        // 以 remarksTemplate（JSON）重建積木；若無則用預設
        initRemarksBlocks(data.remarksTemplate || null);

        // 保存到 localStorage
        saveFormDataToLocalStorage(data);
      } catch (error) {
        showToast('匯入失敗', `匯入過程中發生錯誤: ${error.message}`, 'error');
      }
    }

    // 下載 JSON 檔案
    function downloadJson() {
      const jsonText = $("#exportedJson").val();
      if (!jsonText) {
        showAlert("請先點擊『匯出』按鈕產生 JSON");
        return;
      }

      const blob = new Blob([jsonText], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `報價單資料＿${new Date().toISOString().replace(/[:.]/g, "_")}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    // 其他品名切換時處理折扣（允許負數）
    function handleOtherNameChange(selectElement) {
      const name = $(selectElement).attr('name');
      const idMatch = name.match(/item_([a-z0-9]+)_name/);
      if (!idMatch) return;
      const itemId = idMatch[1];
      const priceInput = $(`input[name="item_${itemId}_price"]`);
      if (!priceInput.length) return;
      if ($(selectElement).val() === '折扣') {
        // 折扣允許負數，預設給 -100
        priceInput.removeAttr('min');
        if (parseInt(priceInput.val()) >= 0) priceInput.val(-100);
      } else {
        priceInput.attr('min', '0');
        if (parseInt(priceInput.val()) < 0) priceInput.val(0);
      }
      updateTotals();
    }

      const selectedFlavor = $(selectElement).val();

      const selectedDrink = $(selectElement).val();
      const name = $(selectElement).attr('name');
      const idMatch = name.match(/item_([a-z0-9]+)_name/);

      const name = $('#customerName').val().trim();
      if (!name) { showAlert('請先填寫客戶名稱再儲存', '缺少名稱'); return; }
      const list = getSavedCustomers();
